<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — Noctua Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0806;
        --bg2: #110e0a;
        --bg3: #1a1410;
        --surface: #1f1812;
        --surface2: #2a2018;
        --border: #3a2e22;
        --gold: #c9a84c;
        --gold-light: #e8c96e;
        --cream: #f5ede0;
        --text: #e8ddd0;
        --text-dim: #9a8e80;
        --red: #e74c3c;
        --font-serif: "Cormorant Garamond", Georgia, serif;
        --font-mono: "Space Mono", monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-mono);
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      .login-container {
        width: 100%;
        max-width: 400px;
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 3rem 2rem;
        border-radius: 4px;
      }

      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-header .logo {
        font-family: var(--font-serif);
        font-size: 2rem;
        color: var(--gold);
        margin-bottom: 0.5rem;
      }

      .login-header p {
        font-size: 0.65rem;
        letter-spacing: 2px;
        color: var(--text-dim);
        text-transform: uppercase;
      }

      .form-group {
        margin-bottom: 1.2rem;
      }

      .form-group label {
        display: block;
        font-size: 0.6rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 0.5rem;
      }

      .form-group input {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 0.8rem;
        padding: 0.8rem 1rem;
        border-radius: 4px;
        outline: none;
        transition: border-color 0.2s;
      }

      .form-group input:focus {
        border-color: var(--gold);
      }

      .btn-login {
        width: 100%;
        background: var(--gold);
        color: var(--bg);
        font-family: var(--font-mono);
        font-size: 0.8rem;
        letter-spacing: 1px;
        font-weight: 700;
        padding: 0.9rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
      }

      .btn-login:hover {
        background: var(--gold-light);
      }

      .btn-login:active {
        transform: scale(0.98);
      }

      .btn-login:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .alert {
        margin-bottom: 1.5rem;
        padding: 0.9rem 1rem;
        border-radius: 4px;
        font-size: 0.75rem;
        display: none;
      }

      .alert.show {
        display: block;
      }

      .alert.error {
        background: rgba(231, 76, 60, 0.15);
        border: 1px solid var(--red);
        color: var(--red);
      }

      .alert.success {
        background: rgba(46, 204, 113, 0.15);
        border: 1px solid #2ecc71;
        color: #2ecc71;
      }

      .login-footer {
        margin-top: 2rem;
        text-align: center;
        font-size: 0.7rem;
        color: var(--text-dim);
      }

      .login-footer a {
        color: var(--gold);
        text-decoration: none;
      }

      .login-footer a:hover {
        text-decoration: underline;
      }

      .loading {
        display: none;
      }

      .loading.show {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .home-link {
        margin-top: 1.5rem;
        text-align: center;
      }

      .home-link a {
        font-size: 0.7rem;
        color: var(--text-dim);
        text-decoration: none;
      }

      .home-link a:hover {
        color: var(--gold);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="logo">🦉 NOCTUA</div>
        <p>Admin Panel</p>
      </div>

      <div id="alert" class="alert"></div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="admin"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          Login <span class="loading" id="spinner"></span>
        </button>
      </form>

      <div class="login-footer">
        <p>Default: admin / admin123</p>
      </div>

      <div class="home-link">
        <a href="/">← Kembali ke Website</a>
      </div>
    </div>

    <script>
      function showAlert(message, type) {
        const alert = document.getElementById("alert");
        alert.textContent = message;
        alert.className = `alert show ${type}`;
      }

      function hideAlert() {
        const alert = document.getElementById("alert");
        alert.className = "alert";
      }

      async function handleLogin(event) {
        event.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const loginBtn = document.getElementById("loginBtn");
        const spinner = document.getElementById("spinner");

        loginBtn.disabled = true;
        spinner.classList.add("show");

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();

          if (data.sukses) {
            showAlert("✅ Login berhasil! Redirect ke dashboard...", "success");
            setTimeout(() => {
              window.location.href = "/admin";
            }, 500);
          } else {
            showAlert(data.pesan || "Login gagal", "error");
            loginBtn.disabled = false;
            spinner.classList.remove("show");
          }
        } catch (error) {
          showAlert("Terjadi kesalahan: " + error.message, "error");
          loginBtn.disabled = false;
          spinner.classList.remove("show");
        }
      }

      // Clear alert on input
      document.getElementById("username").addEventListener("input", hideAlert);
      document.getElementById("password").addEventListener("input", hideAlert);

      // Focus on username input
      document.getElementById("username").focus();
    </script>
  </body>
</html>
